<div class="confirm-dialog">
  <div class="confirm-icon">
    <mat-icon>delete_forever</mat-icon>
  </div>

  <h2>{{ data.title }}</h2>

  <p>{{ data.message }}</p>

  <div class="actions">
    <button mat-button (click)="cancel()">
      {{ data.cancelLabel ?? 'Cancelar' }}
    </button>

    <button mat-flat-button (click)="confirm()">
      {{ data.confirmLabel ?? 'Aceptar' }}
    </button>
  </div>
</div>
